name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    - name: Install ESP32 Core
      run: |
        arduino-cli config init
        arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32

    # BU ADIMI KALDIR - WiFi, WebServer, SPIFFS zaten ESP32 core'da var
    # SADECE HARICI KÜTÜPHANELER GEREKİYORSA EKLE
    # - name: Install Libraries
    #   run: |
    #     arduino-cli lib install "ArduinoJson"

    - name: Prepare sketch
      run: |
        mkdir -p sketch
        find . -maxdepth 1 -name "*.ino" -exec cp {} sketch/sketch.ino \;
        # Eğer .cpp uzantılıysa:
        find . -maxdepth 1 -name "*.cpp" -exec cp {} sketch/sketch.cpp \;

    - name: Compile Firmware
      run: |
        arduino-cli compile --fqbn esp32:esp32:esp32 ./sketch -o firmware.bin

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ESP32-Firmware
        path: firmware.bin

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: firmware.bin
        generate_release_notes: true
