name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    - name: Install ESP32 Core
      run: |
        arduino-cli config init
        arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32

    - name: Prepare sketch
      run: |
        mkdir -p sketch
        # .ino veya .cpp dosyasini bul
        find . -maxdepth 1 -name "*.ino" -exec cp {} sketch/sketch.ino \;
        find . -maxdepth 1 -name "*.cpp" ! -name "build.*" -exec cp {} sketch/sketch.ino \;
        # Dosya bulunamadiysa hata ver
        if [ ! -f sketch/sketch.ino ]; then
          echo "HATA: .ino veya .cpp dosyasi bulunamadi!"
          ls -la .
          exit 1
        fi
        echo "Bulunan dosya:"
        ls -la sketch/

    - name: Compile Firmware
      run: |
        # Derleme
        arduino-cli compile --fqbn esp32:esp32:esp32 ./sketch --output-dir output
        # Ciktiyi kontrol et
        ls -la output/

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ESP32-Firmware
        path: output/*.bin

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: output/*.bin
        generate_release_notes: true
        name: "Release ${{ github.ref_name }}"
