name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    - name: Install ESP32 Core
      run: |
        arduino-cli config init
        arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32

    - name: Prepare sketch
      run: |
        mkdir -p sketch
        # .ino dosyasini bul ve sketch klasorune kopyala
        find . -maxdepth 1 -name "*.ino" -exec cp {} sketch/sketch.ino \;
        # Eger .cpp uzantiliysa:
        find . -maxdepth 1 -name "*.cpp" ! -name "build.*" -exec cp {} sketch/sketch.cpp \;

    - name: Compile Firmware
      run: |
        # Once derleme klasorunu olustur
        mkdir -p output
        # Derle (eski surumlerde -o desteklenmez, ciktiyi build klasorunden alacagiz)
        arduino-cli compile --fqbn esp32:esp32:esp32 ./sketch
        # Derlenen .bin dosyasini output klasorune kopyala
        find . -name "*.bin" -exec cp {} output/firmware.bin \;

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ESP32-Firmware
        path: output/firmware.bin
